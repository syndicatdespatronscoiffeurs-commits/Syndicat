<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat Des Patrons Coiffeurs Pour Dames</title>
  <meta name="description" content="Contact officiel du Syndicat des Patrons Coiffeurs Pour Dames" />

  <style>
    :root {
      --red: #c40000;
      --dark-red: #970000;
      --gold: #d6a84f;
      --black: #141414;
      --text: #1b1b1b;
      --muted: #666666;
      --card: rgba(255, 255, 255, 0.96);
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow-y: auto;
      background:
        radial-gradient(circle at top left, rgba(196, 0, 0, 0.15), transparent 32%),
        radial-gradient(circle at bottom right, rgba(214, 168, 79, 0.18), transparent 34%),
        linear-gradient(145deg, #ffffff 0%, #f7f7f7 48%, #fff2f2 100%);
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 28px 22px 20px;
      text-align: center;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .logo-wrap {
      width: 132px;
      height: 132px;
      margin: 0 auto 18px;
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--gold), var(--dark-red));
      box-shadow:
        0 12px 30px rgba(196, 0, 0, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.65);
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 3px solid #ffffff;
    }

    .logo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
      mix-blend-mode: multiply;
    }

    .official {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: var(--dark-red);
      background: rgba(196, 0, 0, 0.08);
      border: 1px solid rgba(196, 0, 0, 0.12);
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.18;
      font-weight: 850;
      letter-spacing: -0.5px;
      color: #101010;
    }

    .subtitle {
      margin: 0 auto 20px;
      max-width: 340px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 11px;
      margin-top: 8px;
    }

    .button {
      position: relative;
      width: 100%;
      min-height: 56px;
      padding: 13px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.11);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .button::after {
      content: "›";
      position: absolute;
      right: 18px;
      font-size: 24px;
      line-height: 1;
      opacity: 0.75;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.16);
      opacity: 0.97;
    }

    .button:active {
      transform: scale(0.98);
    }

    .button:focus-visible {
      outline: 3px solid rgba(196, 0, 0, 0.25);
      outline-offset: 3px;
    }

    .whatsapp {
      background: linear-gradient(135deg, #21c063, #128c45);
    }

    .instagram {
      background: linear-gradient(135deg, #405de6, #c13584, #f77737);
    }

    .facebook {
      background: linear-gradient(135deg, #1877f2, #0b5ecb);
    }

    .email {
      background: linear-gradient(135deg, #db4437, #b42c22);
    }

    .call {
      background: linear-gradient(135deg, #e00000, #9e0000);
    }

    .maps {
      background: linear-gradient(135deg, #242424, #050505);
    }

    .save {
      background: linear-gradient(135deg, #0d8a3d, #08692f);
    }

    .address {
      width: 100%;
      margin: 16px auto 0;
      padding: 15px 16px;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid var(--border);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.05);
      font-size: 13.5px;
      line-height: 1.45;
      color: #3f3f3f;
    }

    .address strong {
      display: block;
      margin-bottom: 4px;
      color: #111111;
      font-size: 15px;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .card {
        max-width: 390px;
        padding: 24px 18px 18px;
        border-radius: 30px;
      }

      .logo-wrap {
        width: 118px;
        height: 118px;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 20px;
      }

      .subtitle {
        font-size: 13.5px;
        margin-bottom: 18px;
      }

      .button {
        min-height: 55px;
        font-size: 16px;
        border-radius: 17px;
      }
    }

    @media (max-height: 720px) {
      body {
        align-items: flex-start;
      }

      .card {
        margin-top: 6px;
        padding-top: 18px;
        padding-bottom: 14px;
      }

      .logo-wrap {
        width: 100px;
        height: 100px;
        margin-bottom: 10px;
      }

      .official {
        font-size: 10px;
        margin-bottom: 7px;
      }

      h1 {
        font-size: 17px;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 12px;
        margin-bottom: 10px;
      }

      .buttons {
        gap: 7px;
      }

      .button {
        min-height: 42px;
        font-size: 14px;
        padding: 9px 14px;
        border-radius: 15px;
      }

      .address {
        margin-top: 9px;
        padding: 10px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <div class="logo-inner">
        <img src="./logosyndicat.jpg" alt="Logo du Syndicat" />
      </div>
    </div>

    <div class="official">Official Contact Page</div>

    <h1>Syndicat Des Patrons Coiffeurs Pour Dames</h1>

    <p class="subtitle">
      نقابة أصحاب صالونات التزيين والتجميل للسيدات في لبنان
    </p>

    <div class="buttons">
      <a class="button whatsapp" href="https://wa.me/96170386773" target="_blank" rel="noopener">
        WhatsApp
      </a>

      <a class="button instagram" href="https://www.instagram.com/syndicat_despatrons_coiffeurs?igsh=bTRza3F3emdka3Ew" target="_blank" rel="noopener">
        Instagram
      </a>

      <a class="button facebook" href="https://www.facebook.com/share/17h2pu5Fh1/?mibextid=wwXIfr" target="_blank" rel="noopener">
        Facebook
      </a>

      <a class="button email" href="mailto:syndicatdespatronscoiffeurs@gmail.com">

      </a>

      <a class="button call" href="tel:+96170386773">

      </a>

      <a class="button maps" href="https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA" target="_blank" rel="noopener">

      </a>

      <a class="button save" href="contact.vcf" download="Syndicat-Coiffeurs-Dames.vcf">
        Save the Contact
      </a>
    </div>

    <div class="address">
      <strong>Adresse</strong>
      Jdeideh–Bauchrieh Highway,<br />
      Maalouf Center, 4th Floor, Lebanon
    </div>
  </main>
</body>
</html>
