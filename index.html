<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat des Patrons Coiffeurs Dames</title>
  <meta name="description" content="Contact officiel du Syndicat des Patrons Coiffeurs Dames" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(213, 0, 0, 0.10), transparent 34%),
        linear-gradient(160deg, #ffffff 0%, #fafafa 45%, #fff2f2 100%);
      color: #1d1d1d;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      max-height: calc(100dvh - 24px);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #eeeeee;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      padding: 18px 20px 14px;
      text-align: center;
    }

    .logo-wrap {
      width: 108px;
      height: 108px;
      margin: 0 auto 10px;
      border-radius: 50%;
      padding: 5px;
      background: #ffffff;
      border: 2px solid #d50000;
      box-shadow: 0 10px 24px rgba(213, 0, 0, 0.18);
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    h1 {
      font-size: 21px;
      line-height: 1.18;
      margin: 0 0 5px;
      color: #111111;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      line-height: 1.35;
      color: #555555;
      margin: 0 0 13px;
    }

    .buttons {
      width: 100%;
      max-width: 330px;
      margin: 10px auto 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 39px;
      padding: 9px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
      box-shadow: 0 7px 15px rgba(0, 0, 0, 0.09);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.13);
    }

    .whatsapp {
      background: #25D366;
      color: #052b13;
    }

    .instagram {
      background: linear-gradient(135deg, #405DE6, #C13584, #F77737);
    }

    .facebook {
      background: #1877F2;
    }

    .email {
      background: #DB4437;
    }

    .call {
      background: #d50000;
    }

    .maps {
      background: #111111;
    }

    .save {
      background: #0b7a34;
    }

    .address {
      width: 100%;
      max-width: 330px;
      margin: 10px auto 0;
      padding: 9px 12px;
      border-radius: 18px;
      background: #fafafa;
      border: 1px solid #eeeeee;
      font-size: 12px;
      line-height: 1.35;
      color: #333333;
    }

    .address strong {
      display: block;
      margin-bottom: 2px;
      color: #111111;
      font-size: 12.5px;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .card {
        max-width: 385px;
        max-height: calc(100dvh - 16px);
        padding: 12px 14px 10px;
        border-radius: 26px;
      }

      .logo-wrap {
        width: 86px;
        height: 86px;
        padding: 4px;
        margin-bottom: 7px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.12;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 11.5px;
        line-height: 1.25;
        margin-bottom: 8px;
      }

      .buttons {
        max-width: 300px;
        gap: 6px;
        margin-top: 7px;
      }

      .button {
        min-height: 34px;
        padding: 7px 12px;
        font-size: 13px;
        box-shadow: none;
      }

      .address {
        max-width: 300px;
        margin-top: 7px;
        padding: 7px 10px;
        font-size: 10.8px;
        line-height: 1.25;
        border-radius: 15px;
      }

      .address strong {
        font-size: 11.2px;
      }
    }
  </style>

</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <img class="logo" src="logo-syndicat.jpg" alt="Logo du Syndicat" />
    </div>
