  <script>
    function foldLine(line) {
      return line.match(/.{1,73}/g).join("\r\n ");
    }

    function blobToDataURL(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;

        reader.readAsDataURL(blob);
      });
    }

    function resizeImageToBase64(dataUrl, width, height) {
      return new Promise((resolve, reject) => {
        const img = new Image();

        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");

          const scale = Math.max(width / img.width, height / img.height);
          const x = (width - img.width * scale) / 2;
          const y = (height - img.height * scale) / 2;

          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

          const jpgDataUrl = canvas.toDataURL("image/jpeg", 0.85);
          resolve(jpgDataUrl.split(",")[1]);
        };

        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    async function saveContact() {

        const imageDataUrl = await blobToDataURL(imageBlob);
        const photoBase64 = await resizeImageToBase64(imageDataUrl, 300, 300);

        const photoLine = foldLine("PHOTO;ENCODING=b;TYPE=JPEG:" + photoBase64);

        const vcardLines = [

          "VERSION:3.0",

          "ADR;TYPE=WORK:;;Jdeideh-Bauchrieh Highway, Maalouf Center, 4th Floor;;;Lebanon",
          photoLine,
          "URL;TYPE=WhatsApp:https://wa.me/96170386773",
          "URL;TYPE=Facebook:https://www.facebook.com/share/17h2pu5Fh1/",
          "URL;TYPE=Instagram:https://www.instagram.com/syndicat_despatrons_coiffeurs",
          "URL;TYPE=Google Maps:https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA",
          "END:VCARD"
        ];

        const vcard = vcardLines.join("\r\n");

        const file = new Blob([vcard], {
          type: "text/vcard;charset=utf-8"
        });

        const link = document.createElement("a");
        link.href = URL.createObjectURL(file);
        link.download = "Syndicat-Coiffeurs-Dames.vcf";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        URL.revokeObjectURL(link.href);
      } catch (error) {
        alert("The contact could not be saved. Please make sure logo-syndicat.jpg is uploaded in the same folder as index.html.");
      }
    }
  </script>
