<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat Des Patrons Coiffeurs Pour Dames</title>
  <meta name="description" content="Contact officiel du Syndicat des Patrons Coiffeurs Pour Dames" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(213, 0, 0, 0.10), transparent 34%),
        linear-gradient(160deg, #ffffff 0%, #fafafa 45%, #fff2f2 100%);
      color: #1d1d1d;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      overflow-y: auto;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #eeeeee;
      border-radius: 30px;
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.13);
      padding: 22px 22px 16px;
      text-align: center;
    }

.logo-wrap {
  width: 130px;
  height: 130px;
  margin: 0 auto 8px;
  background-image: url("./logosyndicat.jpg");
  background-size: 130px 130px;
  background-position: center;
  background-repeat: no-repeat;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  padding: 0;
  overflow: hidden;
  mix-blend-mode: multiply;
}
    h1 {
      font-size: clamp(14px, 4vw, 18px);
      line-height: 1.2;
      margin: 0 0 6px;
      color: #111111;
      font-weight: 800;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .subtitle {
      font-size: 13.5px;
      line-height: 1.35;
      color: #555555;
      margin: 0 0 14px;
    }

    .buttons {
      width: 100%;
      max-width: 350px;
      margin: 10px auto 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15.5px;
      color: #ffffff;
      box-shadow: 0 7px 15px rgba(0, 0, 0, 0.09);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.13);
    }

    .whatsapp {
      background: #25D366;
      color: #052b13;
    }

    .instagram {
      background: linear-gradient(135deg, #405DE6, #C13584, #F77737);
    }

    .facebook {
      background: #1877F2;
    }

    .email {
      background: #DB4437;
    }

    .call {
      background: #d50000;
    }

    .maps {
      background: #111111;
    }

    .save {
      background: #0b7a34;
    }

    .address {
      width: 100%;
      max-width: 350px;
      margin: 11px auto 0;
      padding: 10px 12px;
      border-radius: 18px;
      background: #fafafa;
      border: 1px solid #eeeeee;
      font-size: 12.5px;
      line-height: 1.35;
      color: #333333;
    }

    .address strong {
      display: block;
      margin-bottom: 2px;
      color: #111111;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      body {
        padding: 6px;
        align-items: flex-start;
      }

      .card {
        width: 96vw;
        max-width: 430px;
        padding: 12px 18px 14px;
        border-radius: 28px;
      }

      .logo-wrap {
        width: 135px;
        height: 135px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: clamp(13px, 3.7vw, 15.5px);
      }

      .subtitle {
        font-size: 12.5px;
        line-height: 1.3;
        margin-bottom: 11px;
      }

      .buttons {
        max-width: 100%;
        gap: 8px;
        margin-top: 8px;
      }

      .button {
        min-height: 41px;
        padding: 9px 14px;
        font-size: 15px;
      }

      .address {
        max-width: 100%;
        margin-top: 10px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.3;
      }

      .address strong {
        font-size: 12.5px;
      }
    }

    @media (max-height: 720px) {
      body {
        align-items: flex-start;
      }

      .card {
        margin-top: 8px;
        margin-bottom: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .logo-wrap {
        width: 115px;
        height: 115px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: clamp(13px, 3.6vw, 16px);
      }

      .subtitle {
        font-size: 11.5px;
        margin-bottom: 8px;
      }

      .buttons {
        gap: 6px;
      }

      .button {
        min-height: 34px;
        font-size: 13.5px;
        padding: 7px 12px;
      }

      .address {
        margin-top: 7px;
        padding: 7px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <img class="logo" src="./logosyndicat.jpg" alt="Logo du Syndicat" />
    </div>

    <h1>Syndicat Des Patrons Coiffeurs Pour Dames</h1>

    <p class="subtitle">
      نقابة أصحاب صالونات التزيين والتجميل للسيدات في لبنان
    </p>

    <div class="buttons">
      <a class="button whatsapp" href="https://wa.me/96170386773" target="_blank" rel="noopener">
        WhatsApp
      </a>

      <a class="button instagram" href="https://www.instagram.com/syndicat_despatrons_coiffeurs?igsh=bTRza3F3emdka3Ew" target="_blank" rel="noopener">
        Instagram
      </a>

      <a class="button facebook" href="https://www.facebook.com/share/17h2pu5Fh1/?mibextid=wwXIfr" target="_blank" rel="noopener">
        Facebook
      </a>

      <a class="button email" href="mailto:syndicatdespatronscoiffeurs@gmail.com">
        Email
      </a>

      <a class="button call" href="tel:+96170386773">
        Contact
      </a>

      <a class="button maps" href="https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA" target="_blank" rel="noopener">
        Location
      </a>

      <a class="button save" href="contact.vcf" download="Syndicat-Coiffeurs-Dames.vcf">
        Save the contact
      </a>
    </div>

    <div class="address">
      <strong>Adresse</strong>
      Jdeideh–Bauchrieh Highway,<br />
      Maalouf Center, 4th Floor, Lebanon
    </div>
  </main>
</body>
</html>
