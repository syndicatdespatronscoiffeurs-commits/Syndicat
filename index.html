<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat Des Patrons Coiffeurs Pour Dames</title>
  <meta name="description" content="Syndicat des Patrons Coiffeurs Pour Dames" />

  <style>
    :root {
      --red: #c40000;
      --dark-red: #970000;
      --text: #171717;
      --muted: #666666;
      --card: rgba(255, 255, 255, 0.97);
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      background:
        radial-gradient(circle at top left, rgba(196, 0, 0, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(214, 168, 79, 0.15), transparent 32%),
        linear-gradient(145deg, #ffffff 0%, #f8f8f8 52%, #fff4f4 100%);
    }

   .card {
  width: 100%;
  max-width: 760px;
  max-height: calc(100dvh - 24px);
  padding: 28px 32px 24px;
  text-align: center;
  background: var(--card);
  border-radius: 34px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  overflow: hidden;
}

    .logo-wrap {
  width: 95px;
  height: 95px;
  margin: 0 auto 18px;
  padding: 0;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  background: transparent !important;
  border-radius: 50%;
  overflow: hidden;
}

.logo-wrap img {
  width: 112%;
  height: 112%;
  object-fit: cover;
  display: block;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  background: transparent !important;
  border-radius: 50%;
  clip-path: circle(48% at 50% 50%);
  transform: translate(-5%, -5%);
}

   h1 {
  margin: 0 0 8px;
  font-size: clamp(18px, 2.2vw, 26px);
  line-height: 1.15;
  font-weight: 850;
  letter-spacing: -0.5px;
  color: #101010;
  white-space: nowrap;
}
    .subtitle {
      margin: 0 auto 14px;
      max-width: 320px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 8px;
    }

    .button {
      position: relative;
      width: 100%;
      min-height: 43px;
      padding: 9px 16px;
      border-radius: 15px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 800;
      font-size: 14.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 7px 16px rgba(0, 0, 0, 0.10);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .button::after {
      content: "›";
      position: absolute;
      right: 16px;
      font-size: 22px;
      line-height: 1;
      opacity: 0.7;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
    }

    .button:active {
      transform: scale(0.98);
    }

    .whatsapp {
      background: linear-gradient(135deg, #20bd61, #128c45);
    }

    .instagram {
      background: linear-gradient(135deg, #405de6, #c13584, #f77737);
    }

    .facebook {
      background: linear-gradient(135deg, #1877f2, #0b5ecb);
    }

    .email {
      background: linear-gradient(135deg, #db4437, #b42c22);
    }

    .call {
      background: linear-gradient(135deg, #e00000, #9e0000);
    }

    .maps {
      background: linear-gradient(135deg, #252525, #050505);
    }

    .save {
      background: linear-gradient(135deg, #0d8a3d, #08692f);
    }

    .address {
      width: 100%;
      margin: 12px auto 0;
      padding: 11px 13px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid var(--border);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      font-size: 12.5px;
      line-height: 1.4;
      color: #3f3f3f;
    }

    .address strong {
      display: block;
      margin-bottom: 3px;
      color: #111111;
      font-size: 13.5px;
    }

    @media (max-width: 600px) {
      .card {
        max-width: 360px;
        padding: 16px 15px 14px;
        border-radius: 24px;
      }

      .logo-wrap {
        width: 82px;
        height: 82px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 17px;
      }

      .subtitle {
        font-size: 12.5px;
        margin-bottom: 12px;
      }

      .buttons {
        gap: 7px;
      }

      .button {
        min-height: 40px;
        font-size: 14px;
        border-radius: 14px;
      }

      .address {
        margin-top: 10px;
        padding: 9px 11px;
        font-size: 12px;
      }
    }

    @media (max-height: 650px) {
      .card {
        padding: 12px 14px;
      }

      .logo-wrap {
        width: 70px;
        height: 70px;
        margin-bottom: 8px;
      }

      h1 {
        font-size: 16px;
      }

      .subtitle {
        font-size: 11.5px;
        margin-bottom: 9px;
      }

      .buttons {
        gap: 6px;
      }

      .button {
        min-height: 36px;
        font-size: 13px;
        padding: 7px 14px;
      }

      .address {
        margin-top: 8px;
        padding: 8px 10px;
        font-size: 11.5px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <img src="./logosyndicat.jpg" alt="Logo du Syndicat" />
    </div>

    <h1>Syndicat Des Patrons Coiffeurs Pour Dames</h1>

    <p class="subtitle">

    <div class="buttons">

        WhatsApp
      </a>

      <a class="button instagram" href="https://www.instagram.com/syndicat_despatrons_coiffeurs?igsh=bTRza3F3emdka3Ew" target="_blank" rel="noopener">
        Instagram
      </a>

      <a class="button facebook" href="https://www.facebook.com/share/17h2pu5Fh1/?mibextid=wwXIfr" target="_blank" rel="noopener">
        Facebook
      </a>

      <a class="button email" href="mailto:syndicatdespatronscoiffeurs@gmail.com">
        Email
      </a>

      <a class="button call" href="tel:+96170386773">
        Contact
      </a>

      <a class="button maps" href="https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA" target="_blank" rel="noopener">
        Location
      </a>

      <a class="button save" href="contact.vcf" download="Syndicat-Coiffeurs-Dames.vcf">
        Save the Contact
      </a>
    </div>

    <div class="address">
      <strong>Adresse</strong>
      Jdeideh–Bauchrieh Highway,<br />
      Maalouf Center, 4th Floor, Lebanon
    </div>
  </main>
</body>
</html>
