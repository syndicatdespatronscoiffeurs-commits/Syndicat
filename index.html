<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat Des Patrons Coiffeurs Pour Dames</title>

  <style>
    :root {
      --text: #151515;
      --muted: #666;
      --card: rgba(255, 255, 255, 0.96);
      --shadow: 0 22px 65px rgba(0, 0, 0, 0.13);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      background:
        radial-gradient(circle at top left, rgba(196, 0, 0, 0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(214, 168, 79, 0.16), transparent 34%),
        linear-gradient(145deg, #ffffff 0%, #f8f8f8 52%, #fff4f4 100%);
    }

    .card {
      width: min(100%, 720px);
      padding: 22px 28px 18px;
      text-align: center;
      background: var(--card);
      border-radius: 34px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .logo-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 12px;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    .logo-wrap img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      display: block;
      transform: translate(-7.5%, -7.5%);
      border-radius: 50%;
      clip-path: circle(47% at 50% 50%);
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(17px, 2.2vw, 24px);
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.4px;
      white-space: nowrap;
      color: #0f0f0f;
    }

    .subtitle {
      margin: 0 auto 16px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--muted);
    }

    .buttons {
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
    }

    .button {
      position: relative;
      min-height: 42px;
      padding: 8px 42px 8px 18px;
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 7px 16px rgba(0, 0, 0, 0.10);
    }

    .button::after {
      content: "›";
      position: absolute;
      right: 18px;
      font-size: 24px;
      line-height: 1;
      opacity: 0.75;
    }

    .whatsapp {
      background: linear-gradient(135deg, #21c063, #128c45);
    }

    .instagram {
      background: linear-gradient(135deg, #405de6, #c13584, #f77737);
    }

    .facebook {
      background: linear-gradient(135deg, #1877f2, #0b5ecb);
    }

    .email {
      background: linear-gradient(135deg, #db4437, #b42c22);
    }

    .call {
      background: linear-gradient(135deg, #e00000, #9e0000);
    }

    .maps {
      background: linear-gradient(135deg, #242424, #050505);
    }

    .save {
      background: linear-gradient(135deg, #0d8a3d, #08692f);
    }

    .address {
      width: 100%;
      max-width: 620px;
      margin: 10px auto 0;
      padding: 10px 14px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-size: 12.5px;
      line-height: 1.4;
      color: #444;
    }

    .address strong {
      display: block;
      margin-bottom: 3px;
      color: #111;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .card {
        width: 100%;
        padding: 18px 14px 14px;
        border-radius: 26px;
      }

      .logo-wrap {
        width: 76px;
        height: 76px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: clamp(12px, 3.7vw, 17px);
        white-space: nowrap;
      }

      .subtitle {
        font-size: 12px;
        margin-bottom: 12px;
      }

      .button {
        min-height: 39px;
        font-size: 14px;
        border-radius: 14px;
      }

      .address {
        font-size: 11.5px;
        padding: 8px 10px;
      }
    }
  </style>
</head>

<body>
  <main class="card">

    <div class="logo-wrap">
      <img src="./logosyndicat.jpg" alt="Logo du Syndicat" />
    </div>

    <h1>Syndicat Des Patrons Coiffeurs Pour Dames</h1>

    <p class="subtitle">
      نقابة أصحاب صالونات التزيين والتجميل للسيدات في لبنان
    </p>

    <div class="buttons">
      <a class="button whatsapp" href="https://wa.me/96170386773" target="_blank" rel="noopener">
        WhatsApp
      </a>

      <a class="button instagram" href="https://www.instagram.com/syndicat_despatrons_coiffeurs?igsh=bTRza3F3emdka3Ew" target="_blank" rel="noopener">
        Instagram
      </a>

      <a class="button facebook" href="https://www.facebook.com/share/17h2pu5Fh1/?mibextid=wwXIfr" target="_blank" rel="noopener">
        Facebook
      </a>

      <a class="button email" href="mailto:syndicatdespatronscoiffeurs@gmail.com">
        Email
      </a>

      <a class="button call" href="tel:+96170386773">
        Contact
      </a>

      <a class="button maps" href="https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA" target="_blank" rel="noopener">
        Location
      </a>

      <a class="button save" href="contact.vcf" download="Syndicat-Coiffeurs-Dames.vcf">
        Save the Contact
      </a>
    </div>

    <div class="address">
      <strong>Adresse</strong>
      Jdeideh–Bauchrieh Highway,<br />
      Maalouf Center, 4th Floor, Lebanon
    </div>

  </main>
</body>
</html>
