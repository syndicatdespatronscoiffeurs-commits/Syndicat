<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syndicat des Patrons Coiffeurs Dames</title>
  <meta name="description" content="Contact officiel du Syndicate of Women’s Hair & Beauty Salon Owners in Lebanon" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, #ffffff 0%, #fafafa 45%, #fff1f1 100%);
      color: #1d1d1d;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;

    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border: 1px solid #eeeeee;
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.10);
      padding: 28px 22px 24px;
      text-align: center;
    }

    .logo {
      width: 156px;
      height: 156px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #d50000;
      background: #fff;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 22px;
      line-height: 1.25;
      margin: 0 0 6px;
      color: #111;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.5;
      color: #555;
      margin: 0 0 20px;
    }

    .buttons {
      display: grid;
      gap: 11px;
      margin-top: 18px;
    }

    a.button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 14px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      transition: transform .15s ease, opacity .15s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      opacity: .94;
    }

    .save {
      background: #0b7a34;
    }

    .whatsapp {
      background: #25D366;
      color: #062a13 !important;
    }

    .instagram {
      background: linear-gradient(135deg, #405DE6, #C13584, #F77737);
    }

    .facebook {
      background: #1877F2;
    }

    .email {
      background: #DB4437;
    }

    .maps {
      background: #111111;
    }

    .call {
      background: #d50000;
    }

    .address {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: #fafafa;
      border: 1px solid #eeeeee;
      font-size: 13.5px;
      line-height: 1.55;
      color: #333;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #777;
    }
  </style>

</head>

<body>
  <main class="card">
    <img class="logo" src="logo-syndicat.jpg" alt="Logo du Syndicat" />


<h1>Syndicat des Patrons Coiffeurs Dames</h1>

<p class="subtitle">
  نقابة أصحاب صالونات التزيين والتجميل للسيدات في لبنان
</p>

<div class="buttons">
  <a class="button whatsapp" href="https://wa.me/96170386773" target="_blank" rel="noopener">
    WhatsApp
  </a>

  <a class="button instagram" href="https://www.instagram.com/syndicat_despatrons_coiffeurs?igsh=bTRza3F3emdka3Ew" target="_blank" rel="noopener">
    Instagram
  </a>

  <a class="button facebook" href="https://www.facebook.com/share/17h2pu5Fh1/?mibextid=wwXIfr" target="_blank" rel="noopener">
    Facebook
  </a>

  <a class="button email" href="mailto:syndicatdespatronscoiffeurs@gmail.com">
    Email
  </a>

  <a class="button call" href="tel:+96170386773">
    Contact
  </a>

  <a class="button maps" href="https://maps.app.goo.gl/W3ZWu7SQoEFEZP4KA" target="_blank" rel="noopener">
    Location
  </a>

  <a class="button save" href="contact.vcf" download="Syndicat-Coiffeurs-Dames.vcf">
    Save the contact
  </a>
</div>

<div class="address">
  <strong>Adresse</strong><br />
  Jdeideh–Bauchrieh Highway,<br />
  Maalouf Center, 4th Floor, Lebanon
</div>

  </main>
</body>
</html>
